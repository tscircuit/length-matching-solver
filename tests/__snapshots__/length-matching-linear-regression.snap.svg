" points="270,454.13885845802724 273.05555555555554,453.8610806802495" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="4.826388888888889,-3.346527017006237 4.888888888888889,-3.3256936836729034" data-type="line" data-label="" points="273.05555555555554,453.8610806802495 275.55555555555554,453.02774734691616" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="4.888888888888889,-3.3256936836729034 4.9375,-3.290971461450681" data-type="line" data-label="" points="275.55555555555554,453.02774734691616 277.5,451.63885845802724" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="4.9375,-3.290971461450681 4.972222222222222,-3.24236035033957" data-type="line" data-label="" points="277.5,451.63885845802724 278.8888888888889,449.6944140135828" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="4.972222222222222,-3.24236035033957 4.993055555555555,-3.17986035033957" data-type="line" data-label="" points="278.8888888888889,449.6944140135828 279.72222222222223,447.1944140135828" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="4.993055555555555,-3.17986035033957 5,-3.103471461450681" data-type="line" data-label="" points="279.72222222222223,447.1944140135828 280,444.13885845802724" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5,-3.103471461450681 5,-2.6767357307253405" data-type="line" data-label="" points="280,444.13885845802724 280,427.0694292290136" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5,-2.6767357307253405 5.018798214742371,-2.4699553685592646" data-type="line" data-label="" points="280,427.0694292290136 280.75192858969484,418.7982147423706" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.018798214742371,-2.4699553685592646 5.075192858969483,-2.3007714358779294" data-type="line" data-label="" points="280.75192858969484,418.7982147423706 283.0077143587793,412.0308574351172" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.075192858969483,-2.3007714358779294 5.169183932681335,-2.169183932681335" data-type="line" data-label="" points="283.0077143587793,412.0308574351172 286.7673573072534,406.7673573072534" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.169183932681335,-2.169183932681335 5.300771435877929,-2.0751928589694826" data-type="line" data-label="" points="286.7673573072534,406.7673573072534 292.0308574351172,403.0077143587793" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.300771435877929,-2.0751928589694826 5.469955368559265,-2.018798214742371" data-type="line" data-label="" points="292.0308574351172,403.0077143587793 298.7982147423706,400.75192858969484" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.469955368559265,-2.018798214742371 5.6767357307253405,-2" data-type="line" data-label="" points="298.7982147423706,400.75192858969484 307.0694292290136,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.6767357307253405,-2 10,-2" data-type="line" data-label="" points="307.0694292290136,400 480,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="40" y="160" width="560" height="320" fill="rgba(30,41,59,0.03)" stroke="rgba(30,41,59,0.55)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="2" x="60" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="12" data-y="2" x="540" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="290" y="300" width="60" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="-2" x="60" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="10" data-y="-2" x="460" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":80,"b":0,"d":-40,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>