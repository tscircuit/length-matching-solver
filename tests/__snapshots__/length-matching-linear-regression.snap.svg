-label="" points="300,381.5676285792142 300,385.7838142896071" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.5,-1.6445953572401777 5.509872351187774,-1.7531912203056792" data-type="line" data-label="" points="300,385.7838142896071 300.39489404751095,390.12764881222716" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.509872351187774,-1.7531912203056792 5.539489404751092,-1.8420423809956348" data-type="line" data-label="" points="300.39489404751095,390.12764881222716 301.57957619004367,393.6816952398254" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.539489404751092,-1.8420423809956348 5.588851160689956,-1.9111488393100444" data-type="line" data-label="" points="301.57957619004367,393.6816952398254 303.5540464275982,396.4459535724018" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.588851160689956,-1.9111488393100444 5.657957619004366,-1.9605105952489086" data-type="line" data-label="" points="303.5540464275982,396.4459535724018 306.3183047601746,398.42042380995633" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.657957619004366,-1.9605105952489086 5.746808779694321,-1.9901276488122273" data-type="line" data-label="" points="306.3183047601746,398.42042380995633 309.87235118777284,399.6051059524891" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.746808779694321,-1.9901276488122273 5.855404642759822,-2" data-type="line" data-label="" points="309.87235118777284,399.6051059524891 314.2161857103929,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="5.855404642759822,-2 10,-2" data-type="line" data-label="" points="314.2161857103929,400 480,400" fill="none" stroke="hsl(150, 100%, 50%)" stroke-width="6"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="40" y="160" width="560" height="320" fill="rgba(30,41,59,0.03)" stroke="rgba(30,41,59,0.55)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="2" x="60" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="12" data-y="2" x="540" y="220" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="290" y="300" width="60" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="-2" x="60" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="10" data-y="-2" x="460" y="380" width="40" height="40" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":80,"b":0,"d":-40,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>