599526992016,-0.35898107968063825 7.530051857320358,-0.311301857320359" data-type="line" data-label="" points="379.8398107968064,334.3592431872255 381.2020742928143,332.45207429281436" fill="none" stroke="hsl(16.363636363636033, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.530051857320358,-0.311301857320359 7.577731079680637,-0.2772452699201595" data-type="line" data-label="" points="381.2020742928143,332.45207429281436 383.1092431872255,331.0898107968064" fill="none" stroke="hsl(16.363636363636033, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.577731079680637,-0.2772452699201595 7.639032937000996,-0.2568113174800399" data-type="line" data-label="" points="383.1092431872255,331.0898107968064 385.56131748003986,330.2724526992016" fill="none" stroke="hsl(16.363636363636033, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.639032937000996,-0.2568113174800399 7.713957429281435,-0.25" data-type="line" data-label="" points="385.56131748003986,330.2724526992016 388.5582971712574,330" fill="none" stroke="hsl(16.363636363636033, 100%, 50%)" stroke-width="6"/></g><g><polyline data-points="7.713957429281435,-0.25 11.95,-0.25" data-type="line" data-label="" points="388.5582971712574,330 558,330" fill="none" stroke="hsl(16.363636363636033, 100%, 50%)" stroke-width="6"/></g><g><rect data-type="rect" data-label="" data-x="6" data-y="0" x="40" y="200" width="560" height="240" fill="rgba(30,41,59,0.03)" stroke="rgba(30,41,59,0.55)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0.25" x="72" y="304" width="16" height="12" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="12" data-y="0.25" x="552" y="304" width="16" height="12" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="-0.25" x="72" y="324" width="16" height="12" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="11.95" data-y="-0.25" x="550" y="324" width="16" height="12" fill="rgba(255,0,0,0.25)" stroke="rgba(255,0,0,0.5)" stroke-width="0.025"/></g><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":80,"b":0,"d":-40,"f":320};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>