bel="" points="264,379.9709685657421 264,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-1.3999999999999995,-1.25 1.200000000000001,-1.25" data-type="line" data-label="" points="264,380 368.00000000000006,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="1.200000000000001,-1.25 1.200000000000001,-1.2494140258727233" data-type="line" data-label="" points="368.00000000000006,380 368.00000000000006,379.9765610349089" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="1.200000000000001,-1.2494140258727233 1.1735600695541146,-1.251753361987944" data-type="line" data-label="" points="368.00000000000006,379.9765610349089 366.9424027821646,380.0701344795178" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="1.1735600695541146,-1.251753361987944 1.1479416217799638,-1.2586986876884705" data-type="line" data-label="" points="366.9424027821646,380.0701344795178 365.91766487119855,380.34794750753883" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="1.1479416217799638,-1.2586986876884705 1.1481441961758976,-1.2592485324774334" data-type="line" data-label="" points="365.91766487119855,380.34794750753883 365.9257678470359,380.3699412990973" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="1.1481441961758976,-1.2592485324774334 4.948144196175897,0.14075146752256656" data-type="line" data-label="" points="365.9257678470359,380.3699412990973 517.9257678470359,324.3699412990973" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="4.948144196175897,0.14075146752256656 5,0.15" data-type="line" data-label="" points="517.9257678470359,324.3699412990973 520,324" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="40" y="130" width="560" height="400" fill="rgba(20, 25, 35, 0.08)" stroke="rgba(150, 170, 200, 0.8)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="280" y="290" width="80" height="80" fill="rgba(220, 80, 80, 0.15)" stroke="rgba(220, 80, 80, 0.8)" stroke-width="0.025"/></g><text data-type="text" data-label="USB: routed" data-x="-7" data-y="5.5" x="40" y="110" fill="black" font-size="14" font-family="sans-serif" text-anchor="start" dominant-baseline="text-after-edge">USB: routed</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":320,"b":0,"d":-40,"f":330};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>