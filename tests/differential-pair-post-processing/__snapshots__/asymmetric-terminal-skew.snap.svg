l="" points="150,386 150.0517737634809,386" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.248705655912977,-1.4 -4.2538608856748805,-1.3608421423339845" data-type="line" data-label="" points="150.0517737634809,386 149.84556457300476,384.4336856933594" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.2538608856748805,-1.3608421423339845 -4.2689752545717345,-1.3243528279564885" data-type="line" data-label="" points="149.84556457300476,384.4336856933594 149.2409898171306,382.97411311825954" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.2689752545717345,-1.3243528279564885 -4.2930187433408955,-1.293018743340895" data-type="line" data-label="" points="149.2409898171306,382.97411311825954 148.2792502663642,381.7207497336358" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.2930187433408955,-1.293018743340895 -4.3243528279564885,-1.268975254571734" data-type="line" data-label="" points="148.2792502663642,381.7207497336358 147.02588688174046,380.75901018286936" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.3243528279564885,-1.268975254571734 -4.3608421423339845,-1.2538608856748796" data-type="line" data-label="" points="147.02588688174046,380.75901018286936 145.5663143066406,380.1544354269952" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.3608421423339845,-1.2538608856748796 -4.4,-1.248705655912977" data-type="line" data-label="" points="145.5663143066406,380.1544354269952 144,379.9482262365191" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.4,-1.248705655912977 -4.4,-1.25" data-type="line" data-label="" points="144,379.9482262365191 144,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.4,-1.25 -4.25,-1.25" data-type="line" data-label="" points="144,380 150,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.25,-1.25 -4.1000000000000005,-1.25" data-type="line" data-label="" points="150,380 155.99999999999997,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-4.1000000000000005,-1.25 -3.95,-1.25" data-type="line" data-label="" points="155.99999999999997,380 162,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.95,-1.25 -3.8,-1.25" data-type="line" data-label="" points="162,380 168,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.8,-1.25 -3.65,-1.25" data-type="line" data-label="" points="168,380 174,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.65,-1.25 -3.5,-1.25" data-type="line" data-label="" points="174,380 180,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.5,-1.25 -3.3499999999999996,-1.25" data-type="line" data-label="" points="180,380 186,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.3499999999999996,-1.25 -3.1999999999999997,-1.25" data-type="line" data-label="" points="186,380 192,380" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.1999999999999997,-1.25 -3.1999999999999997,-1.2494622378370241" data-type="line" data-label="" points="192,380 192,379.97848951348095" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.1999999999999997,-1.2494622378370241 -3.225334972903709,-1.2516094444211325" data-type="line" data-label="" points="192,379.97848951348095 190.98660108385164,380.0643777768453" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.225334972903709,-1.2516094444211325 -3.225244469433803,-1.2521395361734389" data-type="line" data-label="" points="190.98660108385164,380.0643777768453 190.99022122264788,380.08558144693757" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="-3.225244469433803,-1.2521395361734389 4.974755530566197,0.1478604638265611" data-type="line" data-label="" points="190.99022122264788,380.08558144693757 518.990221222648,324.08558144693757" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><polyline data-points="4.974755530566197,0.1478604638265611 5,0.15" data-type="line" data-label="" points="518.990221222648,324.08558144693757 520,324" fill="none" stroke="#e05a5a" stroke-width="4"/></g><g><rect data-type="rect" data-label="" data-x="0" data-y="0" x="40" y="130" width="560" height="400" fill="rgba(20, 25, 35, 0.08)" stroke="rgba(150, 170, 200, 0.8)" stroke-width="0.025"/></g><g><rect data-type="rect" data-label="" data-x="-3.5" data-y="0" x="160" y="290" width="40" height="80" fill="rgba(220, 80, 80, 0.15)" stroke="rgba(220, 80, 80, 0.8)" stroke-width="0.025"/></g><text data-type="text" data-label="USB: routed" data-x="-7" data-y="5.5" x="40" y="110" fill="black" font-size="14" font-family="sans-serif" text-anchor="start" dominant-baseline="text-after-edge">USB: routed</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":40,"c":0,"e":320,"b":0,"d":-40,"f":330};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>